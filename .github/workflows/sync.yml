name: Smart Content-Only Sync
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch channels (bash)
        run: |
          CHANNELS=(
            "mamlekate" "ircfspace" "vahidonline" "iranintltv"
            "persian_rockstar" "hatricktv" "charsouvpn" "iholymaryat70"
            "jadivarlog" "digitechirchannel" "whynationsfail2019"
            "khateraaat" "realxsnake" "soratvpnshop" "dw_farsi"
          )
          
          BASE_URL="https://rsshub.rssforever.com/telegram/channel"
          mkdir -p feeds
          
          TOTAL=${#CHANNELS[@]}
          COUNTER=0
          
          for slug in "${CHANNELS[@]}"; do
            COUNTER=$((COUNTER+1))
            echo "[$COUNTER/$TOTAL] Checking: $slug"
            
            HTTP_CODE=$(curl -L -s -o "feeds/$slug.xml.tmp" -w "%{http_code}" \
              "$BASE_URL/$slug" --max-time 30 --connect-timeout 10 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" != "200" ]; then
              echo "  HTTP $HTTP_CODE - skipping"
              rm -f "feeds/$slug.xml.tmp"
              continue
            fi
            
            if [ ! -s "feeds/$slug.xml.tmp" ] || ! grep -q "<?xml" "feeds/$slug.xml.tmp" 2>/dev/null; then
              echo "  Invalid or empty XML - skipping"
              rm -f "feeds/$slug.xml.tmp"
              continue
            fi
            
            if [ ! -f "feeds/$slug.xml" ]; then
              echo "  First time creating feed"
              mv "feeds/$slug.xml.tmp" "feeds/$slug.xml"
              continue
            fi
            
            if diff -I '<lastBuildDate>' -I '<pubDate>' -I '<updated>' -I '<guid>' \
              "feeds/$slug.xml" "feeds/$slug.xml.tmp" > /dev/null 2>&1; then
              echo "  No real changes"
              rm -f "feeds/$slug.xml.tmp"
            else
              echo "  New content detected"
              mv "feeds/$slug.xml.tmp" "feeds/$slug.xml"
            fi
            
            sleep 2
          done
          
          echo "✅ Finished checking $TOTAL channels"

      - name: Show feed status
        run: |
          python3 -c "
import os
import xml.etree.ElementTree as ET
from datetime import datetime

FEEDS_DIR = 'feeds'

def parse_date(date_str):
    if not date_str:
        return 'Unknown'
    try:
        for fmt in ['%a, %d %b %Y %H:%M:%S %z', '%a, %d %b %Y %H:%M:%S %Z']:
            try:
                dt = datetime.strptime(date_str, fmt)
                return dt.strftime('%Y-%m-%d %H:%M')
            except:
                continue
        return date_str[:16]
    except:
        return date_str[:16]

def check_feed(xml_path):
    try:
        tree = ET.parse(xml_path)
        root = tree.getroot()
        channel = root.find('channel')
        if channel is None:
            return None
        title = channel.findtext('title', 'Untitled').replace('Telegram Channel: @', '')
        last_build = channel.findtext('lastBuildDate', '')
        items = len(channel.findall('item'))
        direct_media = 0
        for item in channel.findall('item'):
            enc = item.find('enclosure')
            if enc is not None and 'api.telegram.org' in enc.get('url', ''):
                direct_media += 1
        return {'title': title, 'last_build': parse_date(last_build), 'items': items, 'direct_media': direct_media}
    except:
        return None

if not os.path.isdir(FEEDS_DIR):
    print('No feeds directory found.')
    exit(0)

xml_files = sorted([f for f in os.listdir(FEEDS_DIR) if f.endswith('.xml')])
if not xml_files:
    print('No XML files found.')
    exit(0)

print('\n' + '='*60)
print('📊 FEED STATUS REPORT')
print('='*60)
print(f\"{'Channel':<20} {'Last Update':<18} {'Items':<6} {'Direct Media':<12}\")
print('-'*60)

for filename in xml_files:
    path = os.path.join(FEEDS_DIR, filename)
    info = check_feed(path)
    if info:
        print(f\"{info['title']:<20} {info['last_build']:<18} {info['items']:<6} {info['direct_media']:<12}\")
    else:
        print(f\"{filename:<20} {'ERROR':<18} {'-':<6} {'-':<12}\")
print('='*60)
"

      - name: Deploy to GitHub
        run: |
          git config --global user.name "Content-Monitor"
          git config --global user.email "bot@github.com"
          git add feeds/*.xml
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update feeds: $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "Committed and pushed changes."
          else
            echo "No changes to commit."
          fi
