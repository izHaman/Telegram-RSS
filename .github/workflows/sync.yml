name: Rotating Feed Sync
on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:

jobs:
  fetch-one:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch one channel
        run: |
          chmod +x fetch-feeds.sh
          ./fetch-feeds.sh
