name: Remote Feed Sync

on:
  schedule:
    - cron: '*/4 * * * *' # Executes every 4 minutes
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  sync-job:
    name: Fetch and Mirror Feeds
    runs-on: ubuntu-latest
    
    # Ensuring the bot has write access to push changes back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone for faster execution

      - name: Execute Sync Script
        run: |
          chmod +x fatch-feeds.sh
          ./fatch-feeds.sh
