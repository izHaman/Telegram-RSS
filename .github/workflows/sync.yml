name: Remote Feed Sync

on:
  schedule:
    - cron: '*/4 * * * *' # Scheduled every 4 minutes
  workflow_dispatch: # Manual trigger support

jobs:
  sync-job:
    name: Sync and Optimize
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install Pillow

      - name: Execute Sync
        run: |
          chmod +x fetch-feeds.sh
          ./fetch-feeds.sh
