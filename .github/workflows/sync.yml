name: Smart Telegram Content-Reader

on:
  schedule:
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  sync-job:
    name: Sync and Optimize
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Execute Fetcher
        run: |
          chmod +x Fetch-feeds.sh
          ./Fetch-feeds.sh
