
name: Smart Content-Only Sync
on:
  schedule:
    - cron: '0 */2 * * *'  # هر ۲ ساعت یک بار
  workflow_dispatch:

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch channels
        run: |
          chmod +x fetch-feeds.sh
          ./fetch-feeds.sh
